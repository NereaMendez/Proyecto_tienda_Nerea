<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments :: head(title='Mi Perfil - NereaNatalia')}"></head>

<body id="top">

<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: nav}"></div>
<div th:replace="~{fragments :: navLog}"></div>

<div class="wrapper row3">
    <main class="hoc container clear">
        <div class="sectiontitle">
            <h6 class="heading" th:text="${titulo}">Mi Perfil</h6>
            <p>Información personal de tu cuenta</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow border-0">
                    <div class="card-header text-white text-center py-4" style="background-color: #8a1538;">
                        <h4 class="mb-0">
                            <i class="fas fa-user-circle fa-3x mb-2"></i><br>
                            <span th:text="${usuario.fullName}">Nombre Usuario</span>
                        </h4>
                    </div>

                    <div class="card-body p-4">
                        <div class="mb-4">
                            <h5 class="border-bottom pb-2" style="color: #8a1538; border-color: #8a1538 !important;">
                                <i class="fas fa-info-circle"></i> Datos personales
                            </h5>

                            <table class="table table-borderless">
                                <tr>
                                    <td style="width: 40%;"><strong><i class="fas fa-user"></i> Nombre completo:</strong></td>
                                    <td th:text="${usuario.fullName}">Nombre Apellidos</td>
                                </tr>
                                <tr>
                                    <td><strong><i class="fas fa-envelope"></i> Email:</strong></td>
                                    <td th:text="${usuario.email}">email@ejemplo.com</td>
                                </tr>
                                <tr>
                                    <td><strong><i class="fas fa-clock"></i> Registrado:</strong></td>
                                    <td th:text="${#temporals.format(usuario.dateTimeRegistration, 'dd/MM/yyyy HH:mm')}">15/03/2026</td>
                                </tr>
                            </table>
                        </div>

                        <div class="mb-4" th:if="${not #lists.isEmpty(usuario.roles)}">
                            <h5 class="border-bottom pb-2" style="color: #8a1538; border-color: #8a1538 !important;">
                                <i class="fas fa-shield-alt"></i> Roles asignados
                            </h5>

                            <div class="mt-3">
                                <span class="me-2"
                                    style="display: inline-block;
                                    border: 1px solid #8a1538;
                                    color: #8a1538;
                                    background-color: transparent;
                                    font-size: 0.85rem;
                                    font-weight: 600;
                                    padding: 0.4rem 1rem;
                                    border-radius: 50px;
                                    text-transform: uppercase;
                                    letter-spacing: 0.5px;"
                            th:each="rol : ${usuario.roles}"
                            th:text="${rol.descripcion}">
                                Administrador
                        </span>
                            </div>
                        </div>
                        <div class="d-flex justify-content-center mt-4">
                            <a th:href="@{/}" class="btn text-white me-3"
                               style="background-color: #8a1538; padding: 0.6rem 1.5rem;">
                                <i class="fas fa-home"></i> IR AL INICIO
                            </a>

                            <form th:action="@{/logout}" method="post" style="display: inline;">
                                <button type="submit" class="btn text-white"
                                        style="background-color: #8a1538; padding: 0.6rem 1.5rem;">
                                    <i class="fas fa-sign-out-alt"></i> CERRAR SESIÓN
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{fragments :: footer}"></div>
<th:block th:replace="~{fragments :: scripts}"></th:block>

</body>
</html>
