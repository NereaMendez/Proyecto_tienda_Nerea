<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments :: head(title='Administrar Productos - NereaNatalia')}"></head>

<body id="top">

<div th:replace="~{fragments :: header}"></div>

<div th:replace="~{fragments :: nav}"></div>

<div class="wrapper row3">
    <main class="hoc container clear">

        <!-- Mensajes de éxito/error -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="sectiontitle">
            <h6 class="heading">✧ ADMINISTRACIÓN DE PRODUCTOS ✧</h6> <br>
            <p>Gestiona los Productos de la tienda</p>
        </div>

        <div class="mb-4 text-end">
            <a th:href="@{/admin/products/create}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Añadir un Producto
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Código</th>
                    <th scope="col">Nombre Producto</th>
                    <th scope="col">Marca</th>
                    <th scope="col">Precio</th>
                    <th scope="col" class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="producto : ${products}" th:object="${producto}">
                    <td th:text="*{id}">1</td>
                    <td th:text="*{productCode}">1234567890123</td>
                    <td th:text="*{name}">Nombre Producto</td>
                    <td th:text="*{marca?.name} ?: 'Sin marca'">Marca Ejemplo</td>
                    <td th:text="'€ ' + *{#numbers.formatDecimal(price, 1, 2)}">€ 0.0</td>

                    <td class="text-center">
                        <div class="btn-group" role="group">

                            <a th:href="@{/admin/products/edit/{id}(id=*{id})}"
                               class="btn btn-sm btn-primary"
                               aria-label="Editar Producto">
                                <i class="bi bi-pencil-square"></i>
                            </a>

                            <a th:href="@{/admin/products/delete/{id}(id=*{id})}"
                               class="btn btn-sm btn-danger"
                               aria-label="Eliminar producto">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr>
                    <td colspan="6" class="text-muted">
                        Total de productos: <span th:text="${#lists.size(products)}">0</span>
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>

        <p class="center">
            <a th:href="@{/admin}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver al Panel de Administración
            </a>
        </p>

    </main>
</div>

<div th:replace="~{fragments :: footer}"></div>

<th:block th:replace="~{fragments :: scripts}"></th:block>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
