<!DOCTYPE html>
<html lang="es" xmlns:th="http://thymeleaf.org">

<head th:replace="~{fragments :: head(title='Productos - NereaNatalia')}"></head>

<body id="top">

<div th:replace="~{fragments :: header}"></div>

<div th:replace="~{fragments :: nav}"></div>
<div th:replace="~{fragments :: navLog}"></div>

<div class="wrapper row2">
    <section class="hoc container clear">

        <div class="sectiontitle">
            <h6 class="heading">°❀⋆.ೃ࿔* MARCAS .⋆❀°ೃ࿔*･</h6>
            <p>Navega por nuestra selección para encontrar el detalle perfecto</p>
        </div>

        <div id="latest">
            <article th:each="marca : ${marcas}">

                <div class="excerpt">
                    <h6 class="heading">
                        <a th:href="@{/marcas/{id}(id=${marca.id})}">
                            <i th:if="${marca.id ==1}" class ="fa fa-star"></i>
                            <i th:if="${marca.id ==2}" class ="fa fa-star"></i>
                            <i th:if="${marca.id ==3}" class ="fa fa-star"></i>
                            <i th:if="${marca.id ==3}" class ="fa fa-star"></i>
                            <span  th:text="|°❀ ${marca.name}|">Nombre de la marca</span>

                        </a>
                    </h6>
                </div>
            </article>
        </div>

        <footer class="center">
            <a class="btn" th:href="@{/categories}">↩  Ver Categorías</a>
            <a class="btn" th:href="@{/}" >Ir al Inicio <i class="fas fa-home"></i></a>
        </footer>

    </section>
</div>

<div th:replace="~{fragments :: footer}"></div>
<th:block th:replace="~{fragments :: scripts}"></th:block>

</body>
</html>
