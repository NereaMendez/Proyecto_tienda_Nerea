<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head(title='Administrar Productos - NereaNatalia')}"></head>

<body id="top">

<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: nav}"></div>

<div class="wrapper row3">
    <main class="hoc container clear">

        <!-- Mensajes de éxito/error -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="sectiontitle">
            <h6 class="heading" th:text="${isEdit} ? '✧ EDITAR PRODUCTO ✧' : '✧ AÑADIR PRODUCTO ✧'">✧ GESTIÓN DE PRODUCTOS ✧</h6>
            <p>Complete la información del producto</p>
        </div>

        <div class="content">
            <div class="card">
                <div class="card-body">
                    <form th:action="${isEdit} ? @{/admin/products/edit/{id}(id=${id})} : @{/admin/products/save}"
                          th:object="${product}"
                          method="post"
                          class="row g-3" novalidate>

                        <div class="col-md-4">
                            <label for="productCode" class="form-label"><b>Código (EAN13):</b></label>
                            <input type="text" th:field="*{productCode}" class="form-control" id="productCode" placeholder="Ej: 8412345678901" required>
                        </div>

                        <div class="col-md-8">
                            <label for="name" class="form-label"><b>Nombre del Producto:</b></label>
                            <input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Nombre descriptivo del producto" required>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label"><b>Descripción:</b></label>
                            <textarea th:field="*{description}" class="form-control" id="description" rows="4" placeholder="Descripción detallada del producto..."></textarea>
                        </div>

                        <div class="col-md-4">
                            <label for="price" class="form-label"><b>Precio (€):</b></label>
                            <div class="input-group">
                                <span class="input-group-text">€</span>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" id="price" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="discount" class="form-label"><b>Descuento (%):</b></label>
                            <div class="input-group">
                                <span class="input-group-text">%</span>
                                <input type="number" th:field="*{discount}" class="form-control" id="discount" placeholder="0" required>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="image" class="form-label"><b>URL Imagen:</b></label>
                            <input type="text"  th:field="*{image}" class="form-control" id="image" placeholder="Dirección de la imágen">

                        </div>

                        <div class="col-md-6">
                            <label for="marca" class="form-label"><b>Marca:</b></label>
                            <select th:field="*{marcaId}" class="form-select" id="marca" required>
                                <option value="">-- Seleccione una marca --</option>
                                <option th:each="marca : ${marcas}" th:value="${marca.id}" th:text="${marca.name}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label"><b>Categorías:</b></label>
                            <div class="card p-3"> <div th:each="cat : ${todasLasCategorias}" class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       th:field="*{categoryIds}"
                                       th:value="${cat.id}"
                                       th:id="${'cat-' + cat.id}">
                                <label class="form-check-label"
                                       th:for="${'cat-' + cat.id}"
                                       th:text="${cat.name}">
                                </label>
                            </div>
                            </div>
                        </div>

                        <!-- Preview de imagen  -->
                        <div class="col-12">
                            <label class="form-label"><b>Vista previa:</b></label>
                            <div>
                                <img th:src="(*{image} != null and *{image} != '') ? *{image} : @{/images/categories/No_Image_Available.jpg}"
                                     alt="Vista previa"
                                     style="max-width: 200px; max-height: 200px; border: 1px solid #ddd; padding: 5px;"
                                     class="img-thumbnail">
                            </div>
                        </div>

                        <div class="col-12 text-center mt-4">
                            <button type="submit" class="btn btn-success btn-lg px-5">
                                <i class="bi bi-save"></i> Guardar Producto
                            </button>
                            <a th:href="@{/admin/products}" class="btn btn-secondary btn-lg px-5">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <p class="center mt-5">
            <a th:href="@{/admin/products}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver al Listado de Productos
            </a>
        </p>

    </main>
</div>

<div th:replace="~{fragments :: footer}"></div>

<th:block th:replace="~{fragments :: scripts}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
